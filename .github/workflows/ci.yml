name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matcher:
    name: Matcher (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: matcher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: matcher/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  mcp:
    name: MCP server (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build

  contract:
    name: Contract (Odra, Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Check
        run: cargo check
      - name: Test
        run: cargo test

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [matcher, mcp]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fail on high or critical advisories
        run: npm audit --audit-level=high
