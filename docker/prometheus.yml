global:
  scrape_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: 'sluice-local'

scrape_configs:
  - job_name: 'sluice-matcher'
    metrics_path: /api/metrics
    static_configs:
      - targets: ['caddy:80']
        labels:
          service: 'matcher'
          chain: 'casper-test'
